<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock-Paper-Scissor</title>
</head>
<body>
    <div class="container">
        <div class="inner-container">
            <h1>ROCK PAPER SCISSOR</h1>

            <div class="btns-container">
                <button class="btn rock">🪨 Rock</button>
                <button class="btn bpaper">📄 Paper</button>
                <button class="btn scissor">✂️ Scissor</button>
            </div>

            <div class="result-container">
                <p>Your Choice: <span class="player-choice"></span></p> 
                <p>Computer Choice: <span class="computer-choice"></span></p>
                <p class="result"></p>
            </div>

            <div class="scores">
                <p>You: <span class="player-score">1</span></p>
                <p>Computer: <span class="computer-score"></span></p>
                
            </div>
            <button class="reset-game">Reset Game</button>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
