<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student ID-Card</title>
</head>
<body>
    <div class="card-container">
        <div class="id-card">
            <header class="card-header">
                <img src="images/logo.png" class="logo" alt="collageLogo" >
                <p>VGDC (Autonomous)</p>
            </header>
            <div class="photo-wrap">
                <img src="images/photo.jpg" alt="Profile Photo" class="photo" height="150px">
            </div>
            <main class="card-body">
                <div class="name-section">
                    <h2>C.VinayKumar</h2>
                    <p>Vivekananda Govt Degree College</p>
                </div>
                <hr class="divider">
                <div class="details">
                    <p><strong>Course:</strong> BCA</p>
                    <p><strong>Birthday:</strong> 29/11/2006</p>
                </div>
                <div class="in-line">
                    <span class="id-label">IDNO: </span>
                    <span class="id-value">124424861014</span>
                </div>
                <div class="barcode">

                </div>
            </main>
            <footer class="card-footer">
                <p class="footer-text">
                    Issued By : VGDC
                </p>
            </footer>
        </div>
    </div>

    
    
</body>
</html>
